<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Informasi Pribadi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.profile-card{
    width:100%;
    max-width:420px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:28px;
    padding:30px;
    box-shadow:
    0 10px 40px rgba(0,0,0,0.3);
    transition:0.4s;
}

.profile-card:hover{
    transform: translateY(-6px);
}

/* FOTO */
.profile-image{
    width:110px;
    height:110px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:3px solid rgba(56,189,248,.5);
    box-shadow:0 0 20px rgba(56,189,248,.3);
}

.profile-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* JUDUL */
.name{
    text-align:center;
    margin-top:18px;
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
    text-shadow:0 0 15px rgba(56,189,248,.3);
}

.job{
    text-align:center;
    color:#94a3b8;
    margin-top:5px;
    font-size:14px;
}

/* INFO */
.info{
    margin-top:25px;
}

.info-item{
    background:rgba(255,255,255,0.05);
    padding:14px 16px;
    border-radius:16px;
    margin-bottom:12px;
    transition:.3s;
}

.info-item:hover{
    background:rgba(255,255,255,0.08);
}

.label{
    font-size:12px;
    color:#94a3b8;
    margin-bottom:4px;
}

.value{
    color:white;
    font-size:15px;
}

/* RESPONSIVE */
@media(max-width:600px){
    .profile-card{
        padding:22px;
    }

    .name{
        font-size:24px;
    }

    .value{
        font-size:14px;
    }
}
.back-button{
    position: fixed;
    top: 12px;   /* naikkan sedikit */
    left: 12px;  /* jangan terlalu masuk */
    
    width: 42px;
    height: 42px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;

    display: flex;
    justify-content: center;
    align-items: center;

    text-decoration: none;
    color: #38bdf8;
    font-size: 24px;

    box-shadow: 0 0 18px rgba(56,189,248,0.15);
    transition: .3s ease;
    z-index: 999;
}

.back-button:hover{
    transform: translateX(-3px);
    box-shadow: 0 0 20px rgba(56,189,248,.3);
}
</style>
</head>
<body>

<a href="index.html" class="back-button">
    ←
</a>

<div class="profile-card">

    <!-- FOTO -->
    <div class="profile-image">
        <img src="src/20260514_130643.png" alt="Foto">
    </div>

    <!-- NAMA -->
    <h1 class="name">Nama Kamu</h1>
    <p class="job">Mahasiswa / junior programer</p>

    <!-- INFORMASI -->
    <div class="info">

        <div class="info-item">
            <div class="label">Nama Lengkap</div>
            <div class="value">Elgi Listian</div>
        </div>

        <div class="info-item">
            <div class="label">Riwayat Pendidikan</div>
            <div class="value">
               Unvirsitas Islam riau
            </div>
        </div>

        <div class="info-item">
            <div class="label">Email</div>
            <div class="value">
                elgilistian@gmail.com
            </div>
        </div>

        <div class="info-item">
            <div class="label">Alamat</div>
            <div class="value">
                Riau, Indonesia
            </div>
        </div>

        <div class="info-item">
            <div class="label">Keahlian</div>
            <div class="value">
                HTML, CSS, JavaScript, UI Design Dll
            </div>
        </div>

    </div>

</div>

</body>
</html>
